# H2 Database configuration
spring.datasource.url=jdbc:h2:file:./data/hofgen;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# JWT Secret and Expiration
hofgen.app.jwtSecret=hofgenSecretKeyCarbonChain2026AdvancedAgenticCodingSecurityKey
hofgen.app.jwtExpirationMs=86400000

# Server port
server.port=8080

# Logging
logging.level.org.springframework.security=DEBUG
