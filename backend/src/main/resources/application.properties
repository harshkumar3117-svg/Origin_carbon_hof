# MySQL Database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/mydb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234h}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# JWT Secret and Expiration
hofgen.app.jwtSecret=${JWT_SECRET:hofgenSecretKeyCarbonChain2026AdvancedAgenticCodingSecurityKey}
hofgen.app.jwtExpirationMs=86400000

# Server port
server.port=8080

# Logging
logging.level.org.springframework.security=DEBUG
